version: 2
updates:
  - package-ecosystem: pub
    directory: /
    schedule: { interval: daily }
    open-pull-requests-limit: 5
    labels: ["deps", "dart"]

  - package-ecosystem: github-actions
    directory: /
    schedule: { interval: weekly, day: monday }
    labels: ["deps", "ci"]
    reviewers: ["yves-vogl"]
