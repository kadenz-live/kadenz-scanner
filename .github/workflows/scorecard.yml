name: OpenSSF Scorecard

# Runs the OpenSSF Scorecard analyzer weekly (and on branch-protection changes)
# and publishes the result to the Scorecard.dev badge. This is a public repo, so
# publish_results can be true and no PAT is needed — the default GITHUB_TOKEN
# plus id-token: write is sufficient.

on:
  branch_protection_rule:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC — weekly cadence
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # write SARIF to the Security tab
      id-token: write          # OIDC token for publish_results
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@f49aabe0b5af0936a0987cfb85d86b75731b0186  # v2.4.1
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF as workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 30

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357  # v3.36.2
        with:
          sarif_file: results.sarif
