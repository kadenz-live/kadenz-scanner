name: Secret scan

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 5 * * 1"   # Monday 05:00 UTC

concurrency:
  group: gitleaks-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# The gitleaks binary is MIT-licensed and free for any use. gitleaks-action@v2
# would require a paid GITLEAKS_LICENSE only inside *private* orgs — this is a
# public repo, but running the binary directly keeps it dependency-free either
# way.
jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.21.2"
        run: |
          set -euo pipefail
          curl -sSfL --retry 3 -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Detect secrets
        run: |
          gitleaks detect \
            --source=. \
            --redact \
            --verbose \
            --no-banner \
            --exit-code=1
