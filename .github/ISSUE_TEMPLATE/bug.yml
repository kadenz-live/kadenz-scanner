name: Bug
description: Something broken or behaving incorrectly in the Kadenz Scanner.
title: "bug: <short summary>"
labels: ["category:bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. For **security** problems do not use this form —
        see SECURITY.md.

  - type: textarea
    id: description
    attributes:
      label: What is happening
      description: Observed behaviour, one paragraph, and why it matters.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      value: |
        1. …
        2. …
        3. …
    validations:
      required: true

  - type: textarea
    id: expected_vs_actual
    attributes:
      label: Expected vs. actual behaviour
      value: |
        **Expected:** …

        **Actual:** …
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - App version (or commit SHA):
        - Platform: iOS | Android
        - Device / OS version:
        - Flutter version (flutter --version):
        - Online or offline validation:
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "P0 — drop-everything (crash / cannot scan)"
        - "P1 — degraded, no clean workaround"
        - "P2 — regular bug"
        - "P3 — minor / cosmetic"
      default: 2
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste relevant log excerpts (redact tokens) and attach screenshots.
    validations:
      required: false
